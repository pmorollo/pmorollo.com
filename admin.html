<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Página Virada</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .admin-page { padding: 40px 0 80px; }
        .admin-page h1 { font-family: var(--font-heading); font-size: 28px; margin-bottom: 8px; }
        .admin-subtitle { color: var(--text-muted); margin-bottom: 32px; font-size: 14px; }
        .admin-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 24px; margin-bottom: 24px; border: 1px solid var(--border); }
        .admin-card h2 { font-family: var(--font-heading); font-size: 18px; margin-bottom: 16px; }
        .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-box { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 20px; text-align: center; border: 1px solid var(--border); }
        .stat-number { font-size: 36px; font-weight: 700; color: var(--accent); font-family: var(--font-heading); }
        .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .subscriber-list { list-style: none; padding: 0; }
        .subscriber-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .subscriber-item:last-child { border-bottom: none; }
        .subscriber-email { font-weight: 500; }
        .subscriber-date { font-size: 12px; color: var(--text-muted); }
        .btn-export { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; }
        .btn-export:hover { background: var(--accent-hover); }
        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
        .admin-actions { display: flex; gap: 12px; margin-bottom: 24px; }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; text-decoration: none; display: inline-block; }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                        <path d="M4 6C4 4.89543 4.89543 4 6 4H14C15.1046 4 16 4.89543 16 6V26C16 27.1046 15.1046 28 14 28H6C4.89543 28 4 27.1046 4 26V6Z" fill="currentColor" opacity="0.2"/>
                        <path d="M18 6C18 4.89543 18.8954 4 20 4H26C27.1046 4 28 4.89543 28 6V26C28 27.1046 27.1046 28 26 28H20C18.8954 28 18 27.1046 18 26V6Z" fill="currentColor" opacity="0.35"/>
                        <path d="M6 5C6 4.44772 6.44772 4 7 4H13C13.5523 4 14 4.44772 14 5V25C14 25.5523 13.5523 26 13 26H7C6.44772 26 6 25.5523 6 25V5Z" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M20 5C20 4.44772 20.4477 4 21 4H25C25.5523 4 26 4.44772 26 5V25C26 25.5523 25.5523 26 25 26H21C20.4477 26 20 25.5523 20 25V5Z" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                </span>
                <span class="logo-text">Página Virada</span>
            </a>
            <a href="index.html" class="back-link">Voltar ao Blog</a>
        </div>
    </header>

    <main>
        <section class="admin-page">
            <div class="container">
                <h1>Painel Administrativo</h1>
                <p class="admin-subtitle">Gerencie as inscrições da newsletter do Página Virada</p>

                <div class="admin-stats">
                    <div class="stat-box">
                        <div class="stat-number" id="total-subs">0</div>
                        <div class="stat-label">Inscritos Total</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="today-subs">0</div>
                        <div class="stat-label">Inscritos Hoje</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="week-subs">0</div>
                        <div class="stat-label">Esta Semana</div>
                    </div>
                </div>

                <div class="admin-actions">
                    <button class="btn-export" onclick="exportCSV()">Exportar CSV</button>
                    <a href="index.html" class="btn-secondary">Ver Blog</a>
                </div>

                <div class="admin-card">
                    <h2>Lista de Inscritos</h2>
                    <ul class="subscriber-list" id="subscriber-list"></ul>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast hidden"></div>

    <script>
        function getSubscribers() {
            return JSON.parse(localStorage.getItem('newsletter_subscribers') || '[]');
        }

        function renderSubscribers() {
            const subs = getSubscribers();
            const list = document.getElementById('subscriber-list');
            document.getElementById('total-subs').textContent = subs.length;

            const today = new Date().toDateString();
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);

            document.getElementById('today-subs').textContent = subs.filter(s => new Date(s.date).toDateString() === today).length;
            document.getElementById('week-subs').textContent = subs.filter(s => new Date(s.date) >= weekAgo).length;

            if (subs.length === 0) {
                list.innerHTML = '<div class="empty-state">Nenhuma inscrito ainda. Compartilhe o blog!</div>';
                return;
            }

            list.innerHTML = subs.reverse().map(s => `
                <li class="subscriber-item">
                    <span class="subscriber-email">${s.email}</span>
                    <span class="subscriber-date">${new Date(s.date).toLocaleDateString('pt-BR')} às ${new Date(s.date).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}</span>
                </li>
            `).join('');
        }

        function exportCSV() {
            const subs = getSubscribers();
            if (subs.length === 0) {
                alert('Nenhum inscrito para exportar.');
                return;
            }
            let csv = 'Email,Data de Inscrição\n';
            subs.forEach(s => {
                csv += s.email + ',' + new Date(s.date).toLocaleDateString('pt-BR') + '\n';
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'inscricoes_pagina_virada.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        function showToast(message) {
            const t = document.getElementById('toast');
            t.textContent = message;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        renderSubscribers();
    </script>

</body>
</html>
